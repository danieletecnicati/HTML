<!DOCTYPE html>
<html>
    <head>
        <title> HTML Fundamentos</title>
      </head>
    <body style="padding-bottom: 500px">
      <!-- 1 - Títulos -->
      <h1>Este é um título importante</h1>
      <h3>Um novo título</h3>
      <!-- 2 - Paragrafos -->
      <p>Descrição dos nossos serviços</p>
      <p>Mais um paragrafo</p>

      <!-- 3 - Tags sem conteúdo  -->
      <p>Um paragrafo</p>
      <br/>
      <p>Segundo paragrafo</p> 
      <hr/>
      <p>Terceiro paragrafo</p>

      <!-- 4 - Comentários -->
      <!-- Este é um comentário -->
       <h2>Mais um título</h2>
      <!-- Ctrl ; cria um comentário  -->

      <!-- 5 - Atributos -->
      <a href="https://www.google.com">Google</a> 
      <br/>
      <!-- 6 - Abrir link em nova aba -->
      <a href="https://www.google.com" target="_blank">Google em nova aba</a>
      <br/>

      <!-- 7 - Imagens -->
       <img src="img/city.jpg" "/>

       <!-- 8 - atributo alt -->
        <img src="img/nature.jpg" alt="Noite na floresta" />

        <!-- 9 - listas nao ordenada  -->
        <ul>
          <li>Carros</li>
          <li>Navios</li>
          <li>Submarinos</li>
          <li>Aviões</li>
        </ul>

    </body>
</html>
