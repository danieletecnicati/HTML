<!DOCTYPE html>
<html>
    <head>
        <title> HTML Fundamentos</title>
      </head>
    <body>
      <!-- 1 - Títulos -->
      <h1>Este é um título importante</h1>
      <h3>Um novo título</h3>
      <!-- 2 - Paragrafos -->
      <p>Descrição dos nossos serviços</p>
      <p>Mais um paragrafo</p>

      <!-- 3 - Tags sem conteúdo  -->
      <p>Um paragrafo</p>
      <br/>
      <p>Segundo paragrafo</p> 
      <hr/>
      <p>Terceiro paragrafo</p>

      <!-- 4 - Comentários -->
      <!-- Este é um comentário -->
       <h2>Mais um título</h2>
      <!-- Ctrl ; cria um comentário  -->
    </body>
</html>
